# ============================================================================
# RAG Knowledge Agent 配置文件
# 修改后重启 python run.py 即可生效，无需重新摄入文档
# ============================================================================

app:
  name: "RAG Knowledge Agent"
  version: "1.0.0"

# ----------------------------------------------------------------------------
# 对话模型提供商：ollama（本地）或 deepseek（云端 API）
# ----------------------------------------------------------------------------
provider: "deepseek"

# ----------------------------------------------------------------------------
# DeepSeek API 配置（仅 provider: "deepseek" 时生效）
# API Key 优先从环境变量 DEEPSEEK_API_KEY 读取
# ----------------------------------------------------------------------------
deepseek:
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-flash"            # deepseek-chat / deepseek-reasoner /
  request_timeout: 60
  max_retries: 3
  temperature: 0.1
  max_tokens: 2048

# ----------------------------------------------------------------------------
# Ollama 本地模型配置（provider: "ollama" 时生效，嵌入始终用 Ollama）
# ----------------------------------------------------------------------------
ollama:
  # Ollama 服务地址（默认本地）
  base_url: "http://localhost:11434"

  # 对话模型：ollama list 查看已下载模型，ollama pull <模型名> 下载新模型
  # 推荐：qwen2:7b（中英文俱佳）、llama3:8b、deepseek-r1:7b
  chat_model: "llama3.2:3b"

  # 嵌入模型：用于将文档向量化，影响检索质量
  # 推荐：nomic-embed-text（768维，平衡速度和质量）、bge-m3（1024维，质量更高）
  embedding_model: "nomic-embed-text"

  # 请求超时（秒），大模型或长回答可调大到 120
  request_timeout: 60

  # 请求失败最大重试次数
  max_retries: 3

  # 温度 0.0~2.0：0=精确确定（适合知识问答），1=有创造性（适合写作）
  temperature: 0.1

  # 单次回答最大 token 数
  max_tokens: 2048

# ----------------------------------------------------------------------------
# ChromaDB 向量数据库配置
# ----------------------------------------------------------------------------
chroma:
  # 向量数据持久化目录，可以创建多个知识库切换不同目录
  # 例如：data/embeddings_projectA, data/embeddings_projectB
  persist_directory: "data/embeddings"

  # 同一个 DB 中可以有多个集合（collection），用于隔离不同来源的文档
  collection_name: "knowledge_base"

# ----------------------------------------------------------------------------
# 文档分块参数（修改后需重新摄入文档才生效）
# ----------------------------------------------------------------------------
chunking:
  # 每个块的大小（字符数），越大 = 更完整但检索精度下降
  # 长论文/报告建议 800，短 Q&A 类文档建议 256，通用建议 512
  chunk_size: 512

  # 相邻块的重叠字符数，避免关键信息被截断在边界处
  chunk_overlap: 64

# ----------------------------------------------------------------------------
# 文档检索参数
# ----------------------------------------------------------------------------
retrieval:
  # 粗检返回的候选块数量，越大越全面但越慢
  top_k_initial: 10

  # 重排序后最终喂给 LLM 的块数量，太多可能超出上下文窗口
  top_k_final: 5

  # 最低相关性阈值（0.0~1.0），低于此分数的块会被丢弃
  # 提高 = 更严格、更少无关内容；降低 = 更多结果、可能包含噪声
  similarity_threshold: 0.3

# ----------------------------------------------------------------------------
# 会话记忆参数
# ----------------------------------------------------------------------------
memory:
  # 每轮对话保留多少条历史记录，影响多轮对话的上下文理解
  max_session_history: 20

  # 会话过期时间（分钟），超时后自动清空对话历史。1440 = 24小时
  session_ttl_minutes: 1440

# ----------------------------------------------------------------------------
# 日志配置
# ----------------------------------------------------------------------------
logging:
  # 日志级别：DEBUG / INFO / WARNING / ERROR
  level: "INFO"

  # 日志文件路径
  file: "logs/agent.log"
